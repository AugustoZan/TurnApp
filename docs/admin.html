<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TurnApp - Admin</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <nav>
      <h1 class="logo">TurnApp</h1>
      <div class="nav-right">
        <span id="admin-name"></span>
        <button id="logout-btn" class="btn-primary">Cerrar Sesión</button>
        <button id="lang-btn" class="lang-btn">
          <img id="lang-flag" src="https://flagcdn.com/w40/gb.png" alt="Switch to English">
        </button>
      </div>
    </nav>
  </header>

  <main class="dashboard-container">
    <h2 id="admin-title">Panel de Administración</h2>

    <!-- Crear slot -->
    <div class="form-box" style="max-width: 500px; margin: 30px 0;">
      <h3 id="create-slot-title">Crear Nuevo Turno</h3>
      <input type="date" id="slot-date">
      <input type="time" id="slot-time">
      <button id="create-slot-btn" class="btn-primary">Crear Turno</button>
      <p id="admin-message" class="message"></p>
    </div>

    <!-- Tabla de turnos -->
    <h2 id="all-appointments-title" style="color: #1E5FA3;">Todos los Turnos</h2>
    <table class="admin-table">
      <thead>
        <tr>
          <th id="admin-th-client">Cliente</th>
          <th id="admin-th-email">Email</th>
          <th id="admin-th-date">Fecha</th>
          <th id="admin-th-time">Hora</th>
          <th id="admin-th-status">Estado</th>
        </tr>
      </thead>
      <tbody id="admin-tbody"></tbody>
    </table>
  </main>

  <script src="js/i18n.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
